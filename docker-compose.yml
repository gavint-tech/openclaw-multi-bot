version: '3.8'

services:

  # ── OpenClaw Gateway ───────────────────────────────────────────────────────
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"   # WebSocket / Web UI
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"    # Bridge / REST
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-~/openclaw/workspace}:/home/node/.openclaw/workspace
    env_file:
      - .env
    command:
      ["node", "dist/index.js", "gateway",
       "--bind", "${OPENCLAW_GATEWAY_BIND:-localhost}",
       "--port", "18789"]
    healthcheck:
      test: ["CMD","node","-e","fetch('http://127.0.0.1:18789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    init: true

  # ── openclaw-cli helper (run commands via: docker compose run --rm openclaw-cli ...) ─
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
    profiles: ["cli"]
    entrypoint: ["node", "dist/index.js"]

  # ── Office UI (static files served by nginx) ──────────────────────────────
  openclaw-ui:
    image: nginx:alpine
    container_name: openclaw-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - openclaw-gateway

networks:
  default:
    name: openclaw-net
